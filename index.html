<?xml version="1.0" encoding="utf-8"?>
<odoo>
    <!-- Historial de movimientos: columnas de costo FIFO opcionales -->
    <record id="view_stock_move_list_fifo_cost" model="ir.ui.view">
        <field name="name">stock.move.list.fifo.cost</field>
        <field name="model">stock.move</field>
        <field name="inherit_id" ref="stock_account.stock_move_view_list_valuation"/>
        <field name="arch" type="xml">
            <xpath expr="//field[@name='value']" position="after">
                <field name="fifo_unit_cost"
                       string="Costo real / pieza"
                       optional="show"
                       readonly="1"/>
                <field name="price_unit"
                       string="Costo unit. (FIFO)"
                       optional="show"
                       readonly="1"
                       digits="[16,4]"/>
                <field name="fifo_cost"
                       string="Costo total (FIFO)"
                       optional="show"
                       readonly="1"/>
            </xpath>
        </field>
    </record>

    <record id="view_picking_form_fifo_breakdown" model="ir.ui.view">
        <field name="name">stock.picking.form.fifo.breakdown</field>
        <field name="model">stock.picking</field>
        <field name="inherit_id" ref="stock.view_picking_form"/>
        <field name="arch" type="xml">
            <xpath expr="//notebook" position="inside">
                <page string="Desglose FIFO" invisible="state != 'done' or not fifo_layer_ids">
                    <field name="fifo_layer_ids" readonly="1">
                        <list>
                            <field name="product_id" string="Producto"/>
                            <field name="in_date" string="Fecha entrada lote"/>
                            <field name="quantity" string="Unidades consumidas"/>
                            <field name="unit_cost" string="Costo unitario" widget="monetary"/>
                            <field name="total_cost" string="Total" widget="monetary"/>
                        </list>
                    </field>
                </page>
            </xpath>
        </field>
    </record>

    <record id="view_move_line_tree_fifo_cost" model="ir.ui.view">
        <field name="name">stock.move.line.list.fifo.cost</field>
        <field name="model">stock.move.line</field>
        <field name="inherit_id" ref="stock.view_move_line_tree"/>
        <field name="arch" type="xml">
            <xpath expr="//field[@name='quantity']" position="after">
                <field name="fifo_breakdown_html"
                       string="Desglose FIFO"
                       widget="html"
                       optional="show"
                       readonly="1"/>
            </xpath>
        </field>
    </record>
</odoo>
